<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startup register</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../src/css/clear.css" />
    <link rel="stylesheet" href="../src/css/main.css" />
    <link rel="stylesheet" href="../src/css/register.css" />
  </head>
  <body>
    <header class="header wrapper">
      <a href="#" class="header-main">
        <img class="header-logo" src="../src/images/logo-icon.png" />
        <h1 class="header-text">Startup</h1>
      </a>

      <nav class="navigation">
        <ul class="navigation-list">
          <li>
            <a href="#" class="navigation-item">
              <img
                class="navigation-icon"
                src="../src/images/startup-icon.png"
                alt="Мій стартап"
              />
              <h2 class="navigation-text">Мій стартап</h2>
            </a>
          </li>
          <li>
            <a href="#" class="navigation-item">
              <img
                class="navigation-icon"
                src="../src/images/market-icon.png"
                alt="Ринок"
              />
              <h2 class="navigation-text">Ринок</h2>
            </a>
          </li>
          <li>
            <a href="#" class="navigation-item">
              <img
                class="navigation-icon"
                src="../src/images/investor-icon.png"
                alt="Інвестори"
              />
              <h2 class="navigation-text">Інвестори</h2>
            </a>
          </li>
        </ul>
      </nav>

      <div class="auth">
        <a class="auth-item" href="#">Реєстрація</a>
        <a class="auth-item" href="#">Вхід</a>
      </div>
    </header>

    <main class="wrapper">
      <section id="register" class="register-section">
        <form class="register-form">
          <h3 class="register-title">Реєстрація користувача</h3>
          <div class="register-form-content">
            <div class="register-item">
              <label class="register-label" for="email"> Нікнейм: </label>
              <input
                class="register-input"
                name="email"
                type="email"
                placeholder="example@gmail.com"
              />
            </div>

            <div class="register-item">
              <label class="register-label" for="email"> Емейл: </label>
              <input
                class="register-input"
                name="email"
                type="email"
                placeholder="example@gmail.com"
              />
            </div>

            <div class="register-item">
              <label class="register-label" for="password"> Пароль: </label>
              <input
                class="register-input"
                name="password"
                type="password"
                placeholder="1234****"
                minlength="8"
                maxlength="16"
              />
            </div>

            <div class="register-item">
              <label class="register-label" for="repeat-password">
                Повторіть пароль:
              </label>
              <input
                class="register-input"
                name="repeat-password"
                type="password"
                placeholder="1234****"
                minlength="8"
                maxlength="16"
              />
            </div>
          </div>
          <button class="button green">Зареєструватись!</button>
        </form>
      </section>
    </main>

    <footer class="footer wrapper">
      <div class="footer-content">
        <nav class="footer-navigation">
          <ul class="footer-navigation-list">
            <li class="footer-navigation-item">
              <a href="#">Мій стартап </a>
            </li>
            <li class="footer-navigation-item">
              <a href="#">Ринок </a>
            </li>
            <li class="footer-navigation-item">
              <a href="#">Інвестори </a>
            </li>
          </ul>
        </nav>
        <ul class="footer-address-list">
          <li>Адреса: Львів, вул. Степана Бандери, 12</li>
          <li>Тел: +38 (032) 123-45-67</li>
          <li>Email: startup@simulator.test</li>
        </ul>
      </div>
      <hr />
      <p class="footer-author">
        © 2026 Startup Simulator, Ihor Palyha. Всі права захищено.
      </p>
    </footer>
  </body>
</html>
